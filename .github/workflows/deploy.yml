name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir -p dist
          cp website/index.html dist/
          cp *.md dist/
          JSONBIN_KEY='${{ secrets.JSONBIN_KEY }}'
          JSONBIN_BIN='${{ secrets.JSONBIN_BIN }}'
          sed -i "s|PLACEHOLDER_JSONBIN_KEY|${JSONBIN_KEY}|g" dist/index.html
          sed -i "s|PLACEHOLDER_JSONBIN_BIN|${JSONBIN_BIN}|g" dist/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
