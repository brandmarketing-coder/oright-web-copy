name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy folder
        env:
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          JSONBIN_BIN: ${{ secrets.JSONBIN_BIN }}
        run: |
          mkdir -p dist
          cp website/index.html dist/
          cp *.md dist/
          cp -r website/versions dist/versions
          python3 -c "import os; f=open('dist/index.html','r'); c=f.read(); f.close(); c=c.replace('PLACEHOLDER_JSONBIN_KEY',os.environ['JSONBIN_KEY']); c=c.replace('PLACEHOLDER_JSONBIN_BIN',os.environ['JSONBIN_BIN']); f=open('dist/index.html','w'); f.write(c); f.close()"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
